<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberDefense Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-2:   #1c2128;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --primary:     #3fb950;
      --primary-dim: #1a3a24;
      --warning:     #d29922;
      --error:       #f85149;
      --info:        #58a6ff;
      --radius:      8px;
      --font-mono:   'JetBrains Mono', monospace;
      --font-body:   'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo svg { color: var(--primary); }
    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      margin-left: auto;
      box-shadow: 0 0 6px var(--primary);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── TASK SELECTOR ── */
    .task-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .task-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 180ms ease;
    }
    .task-btn:hover { border-color: var(--primary); color: var(--text); }
    .task-btn.active {
      background: var(--primary-dim);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      animation: fadeIn 200ms ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-family: var(--font-mono);
      font-weight: 600;
    }
    .avatar.user-av { background: #1f4068; color: var(--info); }
    .avatar.bot-av  { background: var(--primary-dim); color: var(--primary); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.65;
      max-width: 100%;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1f3a52;
      border: 1px solid #2d5986;
      color: #cce5ff;
      font-family: var(--font-mono);
      font-size: 12.5px;
    }
    .msg.bot .bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .msg.system .bubble {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .msg.error-msg .bubble {
      background: #2a0f0f;
      border: 1px solid var(--error);
      color: #ffb3b0;
    }

    .bubble pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-top: 8px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
    }

    .task-tag {
      display: inline-block;
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 5px;
    }
    .tag-log  { background: #1a2f1a; color: var(--primary); }
    .tag-alert{ background: #2a1f0a; color: var(--warning); }

    /* ── TYPING INDICATOR ── */
    .typing { display: flex; gap: 5px; padding: 4px 0; }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2){ animation-delay:.2s }
    .typing span:nth-child(3){ animation-delay:.4s }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── INPUT ── */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #userInput {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 14px;
      resize: none;
      max-height: 140px;
      min-height: 42px;
      line-height: 1.5;
      outline: none;
      transition: border-color 180ms ease;
    }
    #userInput:focus { border-color: var(--primary); }
    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      padding: 10px 18px;
      background: var(--primary);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 180ms ease;
      white-space: nowrap;
    }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn:not(:disabled):hover { opacity: 0.85; }

    .char-count {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-align: right;
      margin-top: 5px;
    }
    .char-count.warn { color: var(--warning); }
    .char-count.over { color: var(--error); }

    /* ── SCROLLBAR ── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
    <div>
      <div class="logo-text">CyberDefense Assistant</div>
      <div class="logo-sub">Proyecto Final · Ciberseguridad · Grupo 5</div>
    </div>
  </div>
  <div class="status-dot" title="API conectada"></div>
</header>

<!-- TASK SELECTOR -->
<div class="task-bar">
  <button class="task-btn active" data-task="log_analysis">📋 Análisis de Logs</button>
  <button class="task-btn" data-task="alert_classification">🚨 Clasificación de Alertas</button>
</div>

<!-- MESSAGES -->
<div id="messages">
  <div class="msg system">
    <div class="bubble">
      // Asistente inicializado · Modelo: llama3.2 · Modo: defensivo<br>
      // Selecciona una tarea arriba y escribe tu consulta.
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea
      id="userInput"
      placeholder="Pega aquí un log o describe una alerta de seguridad..."
      rows="1"
    ></textarea>
    <button id="sendBtn">Enviar ↵</button>
  </div>
  <div class="char-count" id="charCount">0 / 1500</div>
</div>

<script>
  const API_BASE   = "http://localhost:8000";
  const MAX_CHARS  = 1500;

  let activeTask = "log_analysis";
  let isLoading  = false;

  // ── Task selector ──
  document.querySelectorAll(".task-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".task-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTask = btn.dataset.task;
    });
  });

  // ── Textarea auto-resize ──
  const input = document.getElementById("userInput");
  const charCount = document.getElementById("charCount");

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
    const len = input.value.length;
    charCount.textContent = `${len} / ${MAX_CHARS}`;
    charCount.className = "char-count" + (len > MAX_CHARS ? " over" : len > 1200 ? " warn" : "");
  });

  // ── Enter to send (Shift+Enter = new line) ──
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById("sendBtn").addEventListener("click", sendMessage);

  // ── DOM helpers ──
  function appendMsg(role, content, task = null) {
    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.className = `msg ${role}`;

    let inner = "";
    if (role === "user") {
      inner = `<div class="avatar user-av">tú</div>
               <div class="bubble">${escHtml(content)}</div>`;
    } else if (role === "bot") {
      const tag = task === "log_analysis"
        ? `<span class="task-tag tag-log">log_analysis</span>`
        : `<span class="task-tag tag-alert">alert_classification</span>`;
      inner = `<div class="avatar bot-av">IA</div>
               <div class="bubble">${tag}<br>${formatResponse(content)}</div>`;
    } else if (role === "error-msg") {
      inner = `<div class="bubble">⚠️ ${escHtml(content)}</div>`;
    }

    div.innerHTML = inner;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function appendTyping() {
    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.className = "msg bot";
    div.id = "typing-indicator";
    div.innerHTML = `<div class="avatar bot-av">IA</div>
                     <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  function escHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatResponse(text) {
    // Formato básico: negritas con **texto**, saltos de línea, bloques de código
    return escHtml(text)
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code style='background:#0d1117;padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px'>$1</code>")
      .replace(/\n/g, "<br>");
  }

  // ── Send message ──
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;
    if (text.length > MAX_CHARS) {
      appendMsg("error-msg", `El mensaje excede ${MAX_CHARS} caracteres.`);
      return;
    }

    isLoading = true;
    document.getElementById("sendBtn").disabled = true;
    input.value = "";
    input.style.height = "auto";
    charCount.textContent = `0 / ${MAX_CHARS}`;
    charCount.className = "char-count";

    appendMsg("user", text);
    appendTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task: activeTask, message: text }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json();
        appendMsg("error-msg", err.detail || "Error desconocido del servidor.");
      } else {
        const data = await res.json();
        appendMsg("bot", data.response, data.task);
      }
    } catch (e) {
      removeTyping();
      appendMsg("error-msg", "No se pudo conectar con la API. Verifica que el servidor esté corriendo en localhost:8000");
    }

    isLoading = false;
    document.getElementById("sendBtn").disabled = false;
    input.focus();
  }
</script>
</body>
</html>
